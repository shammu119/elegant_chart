name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # 1. Added caching to speed up consecutive workflow runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Install pytest-md-report for beautiful summary tables
          pip install pytest-md-report

      - name: Format check with ruff
        run: ruff format --check src tests # 2. Catches bad code indentation/formatting

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        run: |
          # 3. Runs tests, calculates coverage, and generates a GitHub step markdown summary
          python -m pytest tests/ -v --cov=src --cov-report=term-missing --md-report --md-report-verbose=0 >> $GITHUB_STEP_SUMMARY
        env:
          MPLBACKEND: Agg
